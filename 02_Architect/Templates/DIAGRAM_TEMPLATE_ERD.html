<!DOCTYPE html>
<!-- MÔ TẢ: Template mẫu cho Entity-Relationship Diagram (ERD).
     AG-02 dùng file này làm reference khi sinh ERD.html thực tế.
     Thay thế entities, fields, và relationship paths theo schema thực của dự án. -->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERD — [Tên Dự Án]</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --bg: #080c14; --surface: #0d1520; --border: rgba(99,179,255,0.12);
      --blue: #3b9eff; --purple: #7c3aed; --green: #10b981;
      --yellow: #f59e0b; --red: #ef4444; --text: #e2e8f0; --muted: #64748b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(59,158,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg,rgba(59,158,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    header {
      text-align:center; padding: 40px 24px 24px;
    }
    .badge {
      display:inline-block; padding:4px 14px; border-radius:100px;
      font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      background:rgba(59,158,255,.1); border:1px solid rgba(59,158,255,.2);
      color:var(--blue); margin-bottom:12px;
    }
    h1 { font-size: 28px; font-weight:800; color:#fff; margin-bottom:6px; }
    .sub { font-size:13px; color:var(--muted); }
    .legend {
      display:flex; gap:20px; justify-content:center; flex-wrap:wrap;
      padding:16px 24px; margin:0 auto;
    }
    .legend-item { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); }
    .legend-line { width:28px; height:2px; border-radius:2px; }
    .diagram-wrap {
      overflow: auto; padding: 24px 24px 60px;
      width:100%; max-width:1400px;
    }
    svg { display:block; margin:0 auto; }
    /* Entity styles */
    .entity-header { font-family:'Inter',sans-serif; font-size:13px; font-weight:700; fill:#fff; }
    .entity-field  { font-family:'JetBrains Mono',monospace; font-size:11px; fill:#cbd5e1; }
    .entity-pk     { fill:var(--yellow); }
    .entity-fk     { fill:var(--blue); }
    .rel-label     { font-family:'Inter',sans-serif; font-size:10px; fill:var(--muted); }
    .card-line     { stroke:rgba(99,179,255,.18); stroke-width:1; }
  </style>
</head>
<body>

<header>
  <div class="badge">AG-02 — Entity-Relationship Diagram</div>
  <h1>[Tên Dự Án] — ERD</h1>
  <p class="sub">Database schema: [N] entities, [M] relationships · Generated by AG-02 System Architect</p>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-line" style="background:#f59e0b"></div>
    <span>PK — Primary Key</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#3b9eff"></div>
    <span>FK — Foreign Key</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#10b981; height:2px"></div>
    <span>1-N Relationship</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#7c3aed; height:2px; border-top:2px dashed #7c3aed; background:none"></div>
    <span>N-N (Junction)</span>
  </div>
</div>

<div class="diagram-wrap">
<!-- ══════════════════════════════════════════════════════
     SVG DIAGRAM — AG-02 thay thế phần này bằng ERD thực tế
     viewBox: điều chỉnh theo số lượng entity
     Mỗi entity: <g class="entity"> với <rect> header + fields
     Mỗi relationship: <path> với <marker-end> arrow
════════════════════════════════════════════════════════ -->
<svg viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b9eff"/>
    </marker>
  </defs>

  <!-- ─── ENTITY 1: users ─── -->
  <g class="entity" transform="translate(60,80)">
    <!-- Entity box -->
    <rect width="220" height="180" rx="12" ry="12"
          fill="#0d1520" stroke="rgba(59,158,255,0.3)" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="220" height="38" rx="12" ry="12"
          fill="rgba(59,158,255,0.15)" stroke="none"/>
    <rect width="220" height="12" y="26"
          fill="rgba(59,158,255,0.15)" stroke="none"/>
    <text x="110" y="24" text-anchor="middle" class="entity-header">users</text>
    <!-- Divider -->
    <line x1="0" y1="38" x2="220" y2="38" class="card-line"/>
    <!-- Fields -->
    <text x="14" y="58" class="entity-field entity-pk">🔑 id  UUID  PK</text>
    <text x="14" y="78" class="entity-field">   email  VARCHAR(255)</text>
    <text x="14" y="98" class="entity-field">   name  VARCHAR(100)</text>
    <text x="14" y="118" class="entity-field">   password_hash  TEXT</text>
    <text x="14" y="138" class="entity-field">   role  ENUM</text>
    <text x="14" y="158" class="entity-field">   created_at  TIMESTAMP</text>
  </g>

  <!-- ─── ENTITY 2: orders ─── -->
  <g class="entity" transform="translate(400,80)">
    <rect width="240" height="200" rx="12" ry="12"
          fill="#0d1520" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
    <rect width="240" height="38" rx="12" ry="12"
          fill="rgba(124,58,237,0.15)" stroke="none"/>
    <rect width="240" height="12" y="26"
          fill="rgba(124,58,237,0.15)" stroke="none"/>
    <text x="120" y="24" text-anchor="middle" class="entity-header">orders</text>
    <line x1="0" y1="38" x2="240" y2="38" class="card-line"/>
    <text x="14" y="58"  class="entity-field entity-pk">🔑 id  UUID  PK</text>
    <text x="14" y="78"  class="entity-field entity-fk">🔗 user_id  UUID  FK</text>
    <text x="14" y="98"  class="entity-field">   status  ENUM</text>
    <text x="14" y="118" class="entity-field">   total_amount  DECIMAL</text>
    <text x="14" y="138" class="entity-field">   currency  VARCHAR(3)</text>
    <text x="14" y="158" class="entity-field">   created_at  TIMESTAMP</text>
    <text x="14" y="178" class="entity-field">   updated_at  TIMESTAMP</text>
  </g>

  <!-- ─── ENTITY 3: products ─── -->
  <g class="entity" transform="translate(750,80)">
    <rect width="230" height="180" rx="12" ry="12"
          fill="#0d1520" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
    <rect width="230" height="38" rx="12" ry="12"
          fill="rgba(16,185,129,0.15)" stroke="none"/>
    <rect width="230" height="12" y="26"
          fill="rgba(16,185,129,0.15)" stroke="none"/>
    <text x="115" y="24" text-anchor="middle" class="entity-header">products</text>
    <line x1="0" y1="38" x2="230" y2="38" class="card-line"/>
    <text x="14" y="58"  class="entity-field entity-pk">🔑 id  UUID  PK</text>
    <text x="14" y="78"  class="entity-field">   name  VARCHAR(255)</text>
    <text x="14" y="98"  class="entity-field">   price  DECIMAL(10,2)</text>
    <text x="14" y="118" class="entity-field">   stock  INT</text>
    <text x="14" y="138" class="entity-field">   category_id  UUID  FK</text>
    <text x="14" y="158" class="entity-field">   is_active  BOOLEAN</text>
  </g>

  <!-- ─── ENTITY 4: order_items (Junction) ─── -->
  <g class="entity" transform="translate(400,380)">
    <rect width="240" height="160" rx="12" ry="12"
          fill="#0d1520" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
    <rect width="240" height="38" rx="12" ry="12"
          fill="rgba(245,158,11,0.12)" stroke="none"/>
    <rect width="240" height="12" y="26"
          fill="rgba(245,158,11,0.12)" stroke="none"/>
    <text x="120" y="24" text-anchor="middle" class="entity-header">order_items</text>
    <line x1="0" y1="38" x2="240" y2="38" class="card-line"/>
    <text x="14" y="58"  class="entity-field entity-pk">🔑 id  UUID  PK</text>
    <text x="14" y="78"  class="entity-field entity-fk">🔗 order_id  UUID  FK</text>
    <text x="14" y="98"  class="entity-field entity-fk">🔗 product_id  UUID  FK</text>
    <text x="14" y="118" class="entity-field">   quantity  INT</text>
    <text x="14" y="138" class="entity-field">   unit_price  DECIMAL</text>
  </g>

  <!-- ════ RELATIONSHIPS ════ -->

  <!-- users → orders (1-N): users.id → orders.user_id -->
  <path d="M280,170 H400" stroke="#10b981" stroke-width="1.8"
        fill="none" marker-end="url(#arrow-green)"/>
  <text x="330" y="160" text-anchor="middle" class="rel-label">1</text>
  <text x="395" y="160" text-anchor="end" class="rel-label">N</text>

  <!-- orders → order_items (1-N) -->
  <path d="M520,280 V380" stroke="#10b981" stroke-width="1.8"
        fill="none" marker-end="url(#arrow-green)"/>
  <text x="532" y="330" class="rel-label">1-N</text>

  <!-- products → order_items (1-N) -->
  <path d="M865,260 L865,430 H640" stroke="#10b981" stroke-width="1.8"
        fill="none" marker-end="url(#arrow-green)"/>
  <text x="870" y="350" class="rel-label">1-N</text>

  <!-- Cardinality labels -->
  <text x="285" y="190" class="rel-label" fill="#10b981">has many</text>
  <text x="526" y="295" class="rel-label" fill="#10b981">contains</text>

</svg>
</div>

<div style="text-align:center; padding:20px 0 40px; font-size:12px; color:#334155;">
  Generated by <strong style="color:#3b9eff">AG-02 — System Architect</strong>
  · AntiGravity Agent Framework · <span id="ts"></span>
</div>
<script>
  document.getElementById('ts').textContent = new Date().toLocaleDateString('vi-VN',
    {year:'numeric',month:'long',day:'numeric'});
</script>
</body>
</html>
