services:
  postgres:
    image: postgres:16-alpine
    container_name: thefatmilk-postgres
    environment:
      POSTGRES_USER: thefatmilk
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: thefatmilk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: thefatmilk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
